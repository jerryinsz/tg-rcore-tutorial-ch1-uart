            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-ch2-cargo-${{ hashFiles('tg-rcore-tutorial-ch2/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-ch2-cargo-
      - name: Run ch2 tests
        run: bash test.sh base

